<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Goals - Nazamly</title>
    <link rel="icon" type="image/png" href="pics/1.png">
    <link rel="stylesheet" href="css/goals.css">
    
    <!-- Supabase client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-client.js"></script>
    
    <!-- Confetti for celebration -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    
    <!-- Your main script -->
    <script src="js/goals.js" defer></script>
</head>
<body>
    <div class="announcement-bar" id="announcement">Loading announcement...</div>

    <div class="stars" id="stars"></div>

    <!-- Toast-like message -->
    <div id="messageOverlay" class="message-overlay"></div>

    <div class="container">
        <div class="header-titles" style="text-align: center; margin-bottom: 2.5rem;">
            <h1 class="logo-text">Nazamly</h1>
        </div>

        <div id="goalsContent">
            <div class="navbar">
                <div class="nav-left">
                    <button class="menu-toggle" onclick="toggleSidebar()" title="Menu">☰</button>
                </div>
                <div class="nav-right"></div>
            </div>

            <h1 style="text-align: center;">My Goals</h1>

            <div class="controls">
                <input type="text" id="goalInput" placeholder="Enter your goal..." required>
                <input type="text" id="descInput" placeholder="why you want to achieve it? ">
                <input type="datetime-local" id="deadlineInput" title="Deadline ">
                <button onclick="addGoal()" class="bg-blue-600">Add Goal</button>
            </div>

            <div class="grid" id="goalsGrid"></div>
        </div>
    </div>

    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <span>Main</span>
            <button class="sidebar-close" onclick="toggleSidebar()" aria-label="Close sidebar">×</button>
        </div>

        <a href="index.html">Home 🛖</a>

        <div class="sidebar-section-title">Analysis</div>
        <a href="history.html">History 📜</a>
        <a href="dashboard.html">Dashboard 📊</a>

        <div class="sidebar-section-title">Quizzes</div>
        <a href="weekly_quiz.html">Weekly Quizzes 🎯</a>
        <a href="monthly_quiz.html">Monthly Quizzes 🎯</a>

         <div style="padding: 1.2rem 1rem 0.6rem; font-weight: bold; color: var(--accent); border-bottom: 1px solid rgba(192,38,211,0.15); margin: 1.2rem 0 0.6rem;">
            Smart Tools 🧠
        </div>
        
        <a href="timer.html">Focus Timer ⏱️</a>
        

        <div style="flex-grow: 1;"></div>

        <a href="contact.html">Contact Us</a>
        <a href="#" onclick="logout(); return false;" class="logout-link">Logout</a>
    </div>

    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
